target_repo_path: "."
worktree_base_path: "../agent-worktrees"
max_iterations: 3
max_changed_files: 8
max_diff_lines: 500
allowed_commands:
  - "npm test"
  - "npm run lint"
  - "npm run typecheck"
  - "pytest"
  - "ruff check ."
  - "mypy ."
  - "python3 -m unittest discover -s tests"
gates:
  - "python3 -m unittest discover -s tests"
implementer: "none"
codex_command: "codex"
codex_exec_args: []
human_required_paths:
  - "auth/"
  - "billing/"
  - "payments/"
  - "migrations/"
  - "infra/"
  - ".github/"
  - "Dockerfile"
  - "docker-compose.yml"
output_mode: "draft_pr_only"
auto_merge: false
auto_deploy: false
